name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  windows-test-release:
    name: Windows test release
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check Svelte and TypeScript
        run: npx svelte-check --tsconfig ./tsconfig.json

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build signed Tauri test release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Exile Farm Ledger ${{ github.ref_name }} test release'
          releaseBody: 'Test release for Exile Farm Ledger. Windows may show SmartScreen warnings because the installer is not code-signed.'
          releaseDraft: false
          prerelease: true
